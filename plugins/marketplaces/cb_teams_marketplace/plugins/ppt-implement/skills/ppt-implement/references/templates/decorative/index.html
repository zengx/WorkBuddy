<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPT封面模板库 - Pure Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../unified-styles.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .tpl-item {
        padding: 8px 12px;
        cursor: pointer;
        border-bottom: 1px solid #e5e5e5;
        font-size: 14px;
        transition: background-color 0.2s;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .tpl-item:hover {
        background-color: #f5f5f5;
      }
      .tpl-item.active {
        background-color: #1890ff;
        color: white;
        font-weight: 500;
      }
      .tpl-item .copy-btn {
        padding: 2px 6px;
        font-size: 12px;
        background: #e8e8e8;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      .tpl-item.active .copy-btn {
        background: rgba(255,255,255,0.3);
        color: white;
      }
      .tpl-item .copy-btn:hover {
        background: #d9d9d9;
      }
      .tpl-item.active .copy-btn:hover {
        background: rgba(255,255,255,0.5);
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-size: 18px;
        color: #666;
      }
      .error {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-size: 16px;
        color: #ff4d4f;
      }
    </style>
  </head>
  <body style="background: #fff">
    <div style="display: flex; padding: 10px">
      <div style="width: 220px;height: 100vh;overflow-y: auto;border-right: 1px solid #000;" id="tplList">
        <!-- JS自动填充tpl文件列表 -->
      </div>
      <div style="flex: 1" id="previewArea"></div>
    </div>

    <script>
      // **************** 核心配置 ****************
      // 1. 配置需要预览的tpl文件列表（按实际文件名修改）
      const TPL_FILES = [
        // 简约风格 minimalist (2001-2003)
        "minimalist/2001.tpl",
        "minimalist/2002.tpl",
        "minimalist/2003.tpl",
        // 中国风格 chinese (2004-2006)
        "chinese/2004.tpl",
        "chinese/2005.tpl",
        "chinese/2006.tpl",
        // 卡通风格 cartoon (2007-2009)
        "cartoon/2007.tpl",
        "cartoon/2008.tpl",
        "cartoon/2009.tpl",
        // 手绘风格 hand-drawn (2010-2012)
        "hand-drawn/2010.tpl",
        "hand-drawn/2011.tpl",
        "hand-drawn/2012.tpl",
        // 几何风格 geometric (2013-2015)
        "geometric/2013.tpl",
        "geometric/2014.tpl",
        "geometric/2015.tpl",
        // 文艺风格 literary (2016-2018)
        "literary/2016.tpl",
        "literary/2017.tpl",
        "literary/2018.tpl",
        // 扁平风格 flat (2019-2021)
        "flat/2019.tpl",
        "flat/2020.tpl",
        "flat/2021.tpl",
        // 黑金风格 black-gold (2022-2024)
        "black-gold/2022.tpl",
        "black-gold/2023.tpl",
        "black-gold/2024.tpl",
        // 科技风格 tech (2025-2027)
        "tech/2025.tpl",
        "tech/2026.tpl",
        "tech/2027.tpl",
        // 商务风格 business (2028-2030)
        "business/2028.tpl",
        "business/2029.tpl",
        "business/2030.tpl",
        // 新增tpl文件直接在这里添加即可
      ];
      // **************** 核心逻辑 ****************
      const tplListEl = document.getElementById("tplList");
      const previewAreaEl = document.getElementById("previewArea");
      let activeTpl = "";

      let currentIndex = 0;

      // 初始化：渲染tpl文件列表
      function initTplList() {
        TPL_FILES.forEach((filename, index) => {
          const item = document.createElement("div");
          item.className = "tpl-item";
          item.dataset.file = filename;
          item.dataset.index = index;
          
          // 文件名文本
          const nameSpan = document.createElement("span");
          nameSpan.textContent = filename;
          item.appendChild(nameSpan);
          
          // 复制按钮
          const copyBtn = document.createElement("button");
          copyBtn.className = "copy-btn";
          copyBtn.textContent = "复制";
          copyBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            navigator.clipboard.writeText('decorative/' + filename).then(() => {
              copyBtn.textContent = "已复制";
              setTimeout(() => { copyBtn.textContent = "复制"; }, 1000);
            });
          });
          item.appendChild(copyBtn);
          
          // 点击切换预览文件
          item.addEventListener("click", () => {
            selectTplByIndex(index);
          });
          tplListEl.appendChild(item);
        });
        
        // 默认加载第一个模板
        if (TPL_FILES.length > 0) {
          selectTplByIndex(0);
        }
      }

      // 通过索引选择模板
      function selectTplByIndex(index) {
        if (index < 0 || index >= TPL_FILES.length) return;
        
        currentIndex = index;
        const filename = TPL_FILES[index];
        
        // 切换选中样式
        document
          .querySelectorAll(".tpl-item")
          .forEach((el) => el.classList.remove("active"));
        
        const items = document.querySelectorAll(".tpl-item");
        items[index].classList.add("active");
        
        // 滚动到可见区域
        items[index].scrollIntoView({ block: "nearest", behavior: "smooth" });
        
        // 加载并预览文件
        loadAndPreviewTpl(filename);
      }

      // 加载tpl文件并预览
      function loadAndPreviewTpl(filename) {
        if (activeTpl === filename) return;
        activeTpl = filename;

        // 显示加载状态
        previewAreaEl.innerHTML = '<div class="loading">正在加载文件...</div>';

        // 读取tpl文件（注意：本地运行需开简易服务器，否则会跨域）
        fetch(`./${filename}`)
          .then((response) => {
            if (!response.ok)
              throw new Error(`文件加载失败：${response.status}`);
            return response.text();
          })
          .then((tplContent) => {
            // 包裹基础HTML骨架
            const fullHtml = tplContent.replace("{{FILENAME}}", filename);
            // 预览区域展示完整HTML（两种方式可选）
            // 方式1：直接渲染HTML（可看到最终效果）
            previewAreaEl.innerHTML = fullHtml;
            // 方式2：展示HTML源码（方便查看结构，注释掉方式1，打开方式2）
            // previewAreaEl.innerHTML = `<pre>${escapeHtml(fullHtml)}</pre>`;
          })
          .catch((error) => {
            previewAreaEl.innerHTML = `<div class="error">${error.message}</div>`;
            console.error("加载TPL文件出错：", error);
          });
      }

      // 辅助函数：转义HTML字符（用于展示源码）
      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // 初始化
      initTplList();
      
      // 键盘事件：支持上下键切换模板
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") {
          e.preventDefault();
          selectTplByIndex(currentIndex - 1);
        } else if (e.key === "ArrowDown") {
          e.preventDefault();
          selectTplByIndex(currentIndex + 1);
        }
      });
    </script>
  </body>
</html>
