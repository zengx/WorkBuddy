<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>map中心点偏移</title>
</head>
<script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
<style type="text/css">
    html,
    body {
      height: 100%;
      margin: 0px;
      padding: 0px;
      position: relative;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #container-center {            
      width: 10px;            
      height: 10px;            
      background-color: blue;            
      position: absolute;            
      top: 0;            
      bottom: 0;            
      left: 0;            
      right: 0;            
      margin: auto;        
    }
</style>

<body onload="initMap()">
	<div id="container"></div>
	<div id="container-center"></div>
	<script type="text/javascript">
		var map;

		function initMap() {
			var center = new TMap.LatLng(40.040452, 116.273486);
			//初始化地图
			map = new TMap.Map("container", {
				zoom: 17, //设置地图缩放级别
				center: center, //设置地图中心点坐标
				offset: { // 中心点偏移
					x: 0,
					y: 100,
				}
			});

			var markerGeo = {
				id: 'center',
				position: map.getCenter(),
			};

			// 创建一个位于地图中心点的marker
			markerLayer = new TMap.MultiMarker({
				map: map,
				geometries: [
					markerGeo
				]
			});

			// 监听中心点变化事件，更新marker的位置
			map.on('center_changed', () => {
				markerGeo.position = map.getCenter();
				markerLayer.updateGeometries([markerGeo]);
			});
		}
	</script>
</body>

</html>
