<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>简单多边形</title>
  </head>
  <script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0px;
      padding: 0px;
      overflow: hidden;
    }

    #mapContainer {
      position: relative;
      width: 100%;
      height: 100%;
    }
  </style>

  <body onload="initMap()">
    <div id="mapContainer"></div>
  </body>
</html>
<script>
  function initMap() {
    var center = new TMap.LatLng(40.040452, 116.273486); // 设置中心点坐标
    // 初始化地图
    var map = new TMap.Map('mapContainer', {
      center: center,
      zoom: 16,
    });
    var path = [
      // 多边形的位置信息
      new TMap.LatLng(40.041117253378246, 116.2722415837743),
      new TMap.LatLng(40.03942536171407, 116.2726277820093),
      new TMap.LatLng(40.03970460886076, 116.27483769345417),
      new TMap.LatLng(40.041404706498625, 116.27443003983899),
    ];
    // 初始化polygon
    var polygon = new TMap.MultiPolygon({
      id: 'polygon-layer', // 图层id
      map: map, // 显示多边形图层的底图
      styles: {
        // 多边形的相关样式
        polygon: new TMap.PolygonStyle({
          color: '#3777FF', // 面填充色
          showBorder: false, // 是否显示拔起面的边线
          borderColor: '#00FFFF', // 边线颜色
        }),
      },
      geometries: [
        {
          id: 'polygon', // 多边形图形数据的标志信息
          styleId: 'polygon', // 样式id
          paths: path, // 多边形的位置信息
          properties: {
            // 多边形的属性数据
            title: 'polygon',
          },
        },
      ],
    });
  }
</script>
