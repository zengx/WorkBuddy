<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>弧线图点击事件</title>
</head>
<script charset="utf-8"
    src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77&libraries=visualization"></script>
<style type="text/css">
    html,
    body {
        height: 100%;
        margin: 0px;
        padding: 0px;
    }

    #container {
        width: 100%;
        height: 100%;
    }
    #info{
        display: none;
        position: absolute;
        left: 30px;
        top: 30px;
        background: #fff;
        border-radius: 5px;
        padding: 10px;
    }
</style>

<body onload="initMap()">
    <div id="container"></div>
    <div id="info"></div>
    <script src="https://mapapi.qq.com/web/lbs/visualizationApi/demo/data/arc.js"></script>
    <script>
        function initMap() {
            var center = new TMap.LatLng(37.80787, 112.269029);
            var infoDom = document.getElementById('info');

            var data = arcData;
            //初始化地图
            var map = new TMap.Map("container", {
                zoom: 5,//设置地图缩放级别
                pitch: 30,
                center: center,//设置地图中心点坐标
                mapStyleId: "style4", //个性化样式
               baseMap: {
            		type: "vector",
            		features: ["base", "building3d"], // 隐藏矢量文字
          		},
            });
            //初始化弧线图并添加至map图层
            var arc = new TMap.visualization.Arc({
                animatable: true,
                mode: 'vertical', // 弧线平面与地平面垂直
		            selectOptions: { //拾取配置
				            action: 'click', //拾取动作
				            style: { //选中样式
						            width: 6,
						            color: "#1CD5FF",
						            animateColor: "#A8EFFF"
				            },
				            enableHighlight: false //是否使用高亮效果
		            }

            })
            .addTo(map)
            .setData(data);//设置数据

            // 绑定事件
            arc.on('click', evt => {
                var aggregator = evt && evt.detail && evt.detail.arc;
                if (aggregator) {
                    infoDom.style.display = 'block';
                    infoDom.innerHTML = '弧线数据值： ' + aggregator.count;
                } else {
                    infoDom.style.display = null;
                }
            });
        }
    </script>
</body>

</html>
