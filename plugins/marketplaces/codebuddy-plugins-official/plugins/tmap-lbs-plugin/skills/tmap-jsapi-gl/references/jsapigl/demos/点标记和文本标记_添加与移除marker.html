<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>添加与移除marker</title>
</head>
<script charset="utf-8"
    src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
<style type="text/css">
    html,
    body {
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
    }

    #container {
        position: relative;
        width: 100%;
        height: 100%;
    }

    #removeMarker{
        position: absolute;
        left: 150px;
        top: 30px;
        z-index: 9999;
    }
    #createMarker{
        position: absolute;
        left: 30px;
        top: 30px;
        z-index: 9999;
    }
</style>

<body>
    <div id="container"></div>
    <input type="button" id="createMarker" onclick="createMarker()" value="createMarker">
    <input type="button" id="removeMarker" onclick="removeMarker()" value="removeMarker">
    <script>
        var marker = null;
        var center = new TMap.LatLng(39.984104, 116.307503);//设置中心点坐标
        //初始化地图
        var map = new TMap.Map("container", {
            center: center
        });

        //创建marker事件
        function createMarker() {
            if (!marker) {
                marker = new TMap.MultiMarker({
                    id: 'marker-layer',
                    map: map,
                    styles: {
                        "marker": new TMap.MarkerStyle({
                            "width": 25,
                            "height": 35,
                            "anchor": { x: 16, y: 32 },
                            "src": 'https://mapapi.qq.com/web/lbs/javascriptGL/demo/img/markerDefault.png'
                        })
                    },
                    geometries: [{
                        "id": 'demo',
                        "styleId": 'marker',
                        "position": new TMap.LatLng(39.984104, 116.307503),
                        "properties": {
                            "title": "marker"
                        }
                    }]
                });
            }
        }
        //移除marker事件
        function removeMarker() {
            if (marker) {
                marker.setMap(null);
                marker = null;
            }
        }
    </script>
</body>

</html>
