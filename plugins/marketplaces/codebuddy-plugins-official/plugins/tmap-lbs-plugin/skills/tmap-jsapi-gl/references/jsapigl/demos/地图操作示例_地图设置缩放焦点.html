<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>地图设置缩放焦点</title>
</head>
<script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
<style type="text/css">
    html,
    body {
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
    }

    #containerOne {
        width: 100%;
        height: 45%;
       
    }
    #containerTwo {
        width: 100%;
        height: 45%;
    }

    p{
        margin: 0;
        margin-bottom: 20px;
        text-align: center;
    }
</style>

<body>
    <div id="containerOne"></div>
    <p>地图一: 根据鼠标/双指位置缩放</p>
    <div id="containerTwo"></div>
    <p>地图二：根据地图中心点缩放</p>
    <script type="text/javascript">
            var center = new TMap.LatLng(39.984104, 116.307503);
             //初始化地图一
             var mapOne = new TMap.Map("containerOne", {
                center,
                // 默认缩放，双指中心位置（移动端），鼠标的光标位置（PC端）
                mapZoomType: TMap.constants.MAP_ZOOM_TYPE.DEFAULT
            });
            //初始化地图二
            var mapTwo = new TMap.Map("containerTwo", {
                center,
                // 根据地图中心点缩放（移动端和PC端）
                mapZoomType: TMap.constants.MAP_ZOOM_TYPE.CENTER
            });

    </script>
</body>

</html>
