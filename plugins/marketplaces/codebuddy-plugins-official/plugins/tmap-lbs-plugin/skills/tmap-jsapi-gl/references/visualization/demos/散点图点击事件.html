<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>散点图点击事件</title>
</head>
<script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77&libraries=visualization"></script>
<style type="text/css">
    html,
    body {
        height: 100%;
        margin: 0px;
        padding: 0px;
    }

    #container {
        width: 100%;
        height: 100%;
    }
    #info{
        display: none;
        position: absolute;
        left: 30px;
        top: 30px;
        background: #fff;
        border-radius: 5px;
        padding: 10px;
    }
</style>

<body onload="initMap()">
    <div id="container"></div>
    <div id="info">
        
    </div>
    <script src="https://mapapi.qq.com/web/lbs/visualizationApi/demo/data/Dot.js"></script>
    <script>
        function initMap() {
            var info = document.getElementById("info");
            var center = new TMap.LatLng(39.984104, 116.307503);
            //初始化地图
            var map = new TMap.Map("container", {
                zoom:8,//设置地图缩放级别
                center: center,//设置地图中心点坐标
                mapStyleId: "style4" ,//个性化样式
               baseMap: {
            		type: "vector",
            		features: ["base", "building3d"], // 隐藏矢量文字
          		},
            });
            //初始化散点图并添加至map图层
            var dot = new TMap.visualization.Dot({
                faceTo:"screen",//散点固定的朝向
		            selectOptions: { //拾取配置
				            action: 'click', //拾取动作
				            style: { //选中样式
					            fillColor: "#1CD5FF",
				            },
				            enableHighlight: false //是否使用高亮效果
		            }
            })
            .addTo(map)
            .setData(pointData);//设置数据

            //绑定点击事件
            dot.on("click",function(evt){
                if(evt.detail.dot){
                    info.style.display = 'block';
                    info.innerHTML = "当前点击点坐标为：" + evt.detail.dot.lat+","+evt.detail.dot.lng;
                } else {
                    info.style.display = '';
                }
            })
        }
    </script>
</body>

</html>
