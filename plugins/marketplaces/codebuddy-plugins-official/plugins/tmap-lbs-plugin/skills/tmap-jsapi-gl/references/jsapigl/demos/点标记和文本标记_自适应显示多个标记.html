<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>自适应显示多个标记</title>
</head>
<script charset="utf-8"
    src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
<style type="text/css">
    html,
    body {
        height: 100%;
        margin: 0px;
        padding: 0px;
        overflow: hidden;
    }

    #container {
        position: relative;
        width: 100%;
        height: 100%;
    }
    #info{
        position: absolute;
        left: 30px;
        top:30px;
        background: #FFF;
        width:350px;
        height: 80px;
        padding: 10px;
        border-radius: 3px;
    }
    input{
        position: absolute;
        left: 30px;
        top: 30px;
        z-index: 9999;
    }

</style>

<body>
    <div id="container"></div>
    <input type="button" value="自适应显示多个标注" onclick="showMarker()">
    <script>
        var center = new TMap.LatLng(39.984104, 116.307503);//设置中心点坐标
        //初始化地图
        var map = new TMap.Map("container", {
            center: center
        });
        var markerArr = [{
                "id": "marker1",
                "styleId": 'marker',
                "position": new TMap.LatLng(39.954104, 116.457503),
                "properties": {
                    "title": "marker1"
                }
            }, {
                "id": "marker2",
                "styleId": 'marker',
                "position": new TMap.LatLng(39.794104, 116.287503),
                "properties": {
                    "title": "marker2"
                }
            },{
                "id": "marker3",
                    "styleId": 'marker',
                    "position": new TMap.LatLng(39.984104, 116.307503),
                    "properties": {
                        "title": "marker3"
                    }
            }

            ];
        //初始化marker
        var marker = new TMap.MultiMarker({
            id: 'marker-layer',
            map: map,
            styles: {
                "marker": new TMap.MarkerStyle({
                    "width": 25,
                    "height": 35,
                    "anchor": { x: 16, y: 32 },
                    "src": 'https://mapapi.qq.com/web/lbs/javascriptGL/demo/img/markerDefault.png'
                })
            },
            geometries: markerArr
        });
        //初始化
        var bounds = new TMap.LatLngBounds();
        
        //设置自适应显示marker
        function showMarker(){
            //判断标注点是否在范围内
            markerArr.forEach(function(item){
                //若坐标点不在范围内，扩大bounds范围
                if(bounds.isEmpty() || !bounds.contains(item.position)){
                    bounds.extend(item.position);
                }
            })
            //设置地图可视范围
            map.fitBounds(bounds, {
                padding: 100 // 自适应边距
            });
        }

    </script>
</body>

</html>
