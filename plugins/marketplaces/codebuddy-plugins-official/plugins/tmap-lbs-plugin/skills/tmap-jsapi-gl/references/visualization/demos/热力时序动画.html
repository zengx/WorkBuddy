<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>3D经典热力</title>
</head>
<script charset="utf-8"
  src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77&libraries=visualization"></script>
<style type="text/css">
  html,
  body {
    height: 100%;
    margin: 0px;
    padding: 0px;
  }

  #container {
    width: 100%;
    height: 100%;
  }

  #name {
    position: absolute;
    bottom: 10px;
    right: 20px;
    font-size: 12px;
    color: #ffffff;
  }
</style>

<body>
  <div id="container"></div>
  <div id="name">成都市24小时人口时序图</div>
  <script src="https://mapapi.qq.com/web/lbs/visualizationApi/demo/data/heatAnimation.js"></script>
  <script>
    //初始化地图
    map = new TMap.Map("container", {
      zoom: 11.5, //设置地图缩放级别
      pitch: 41.5, // 设置地图俯仰角
      center: new TMap.LatLng(30.61235023802061, 104.06067725164951), //设置地图中心点坐标
      mapStyleId: "style4", //个性化样式
      baseMap: {
        type: "vector",
        features: ["base", "building3d"], // 隐藏矢量文字
      },
    });

    //初始化热力图并添加至map图层
    heat = new TMap.visualization.Heat({
      max: 180, // 热力最强阈值
      min: 0, // 热力最弱阈值
      height: 40, // 峰值高度
      radius: 30, // 最大辐射半径
      transitAnimation: {
        duration: 3000, //动画时长
      },
      enableLighting: true, //热力图是否呈现光照效果
    }).addTo(map);
    heat.setData(data[0]);

    //循环24小时数据
    var index = 0;
    setInterval(function () {
      index++;
      heat.setData(data[index]);
      if (index == data.length - 1) {
        index = 0;
      } //如果大于数据长度-1 从0开始
    }, 3500);
  </script>
</body>

</html>
