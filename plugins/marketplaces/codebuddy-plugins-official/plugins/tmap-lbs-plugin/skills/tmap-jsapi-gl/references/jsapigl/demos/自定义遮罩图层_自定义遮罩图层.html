<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>遮罩图层</title>
</head>
<script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
<style type="text/css">
  html,
  body {
    height: 100%;
    margin: 0px;
    padding: 0px;
    position: relative;
  }

  #container {
    width: 100%;
    height: 100%;
  }
  #btn {
    position: absolute;
    top: 30px;
    left: 30px;
    z-index: 1001;
    padding: 6px 8px;
  }
</style>

<body onload="initMap()">
  <div id="container"></div>
  <input type="button" id="btn" onclick="changeMaskLayer()" value="添加遮罩层">
  <script type="text/javascript">
    var map, mask;

    var isMaskExist = false;
    var maskId = 'mask-layer';
    var paths = [
      new TMap.LatLng(40.04116648755316, 116.27218534259555),
      new TMap.LatLng(40.03936793557013, 116.2725983350083),
      new TMap.LatLng(40.03971286702527, 116.27493147278983),
      new TMap.LatLng(40.04147856016226, 116.27450239006976)
    ];

    function initMap() {
      var center = new TMap.LatLng(40.040452, 116.273486);
      //初始化地图
      map = new TMap.Map("container", {
        zoom: 18, //设置地图缩放级别
        center: center, //设置地图中心点坐标
      });

      mask = new TMap.MaskLayer({
        map: map,
        geometries: [],
      });
    }

    function changeMaskLayer() {
      var btn = document.getElementById('btn');
      if (!isMaskExist) {
        mask.add([{
          id: maskId,
          paths: paths,
        }]);
        btn.value = '移除遮罩层';
        isMaskExist = true;
      } else {
        mask.remove([maskId]);
        btn.value = '添加遮罩层';
        isMaskExist = false;
      }
    }
  </script>
</body>

</html>
