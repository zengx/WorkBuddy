<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>折线-虚线样式</title>
</head>
<script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
<style type="text/css">
  html,
  body {
    height: 100%;
    margin: 0px;
    padding: 0px;
    overflow: hidden;
  }

  #container {
    position: relative;
    width: 100%;
    height: 100%;
  }
</style>

<body>
  <div id="container"></div>
  <script type="text/javascript">
    var center = new TMap.LatLng(39.98183908712013, 116.31021738052368);
    //初始化地图
    var map = new TMap.Map("container", {
      zoom: 16,
      center: center
    });
    var paths = [
      new TMap.LatLng(39.98481500648338, 116.30571126937866),
      new TMap.LatLng(39.982266575222155, 116.30596876144409),
      new TMap.LatLng(39.982348784165886, 116.3111400604248),
      new TMap.LatLng(39.978813710266024, 116.3111400604248),
      new TMap.LatLng(39.978813710266024, 116.31699800491333)
    ];
    var dashPaths = [
    new TMap.LatLng(39.98481500648338, 116.30571126937866),
    new TMap.LatLng(39.97899457895122, 116.30601167678833),
    new TMap.LatLng(39.97864928377309,  116.31277084350586),
    new TMap.LatLng(39.978813710266024, 116.31699800491333)
    ];
    var polylineLayer = new TMap.MultiPolyline({
      map, // 绘制到目标地图
      // 折线样式定义
      styles: {
        'style_blue': new TMap.PolylineStyle({
          'color': '#295BFF', // 线填充色
          'width': 6, // 折线宽度
          'lineCap': 'round', // 线端头方式
        }),
        'style_dash': new TMap.PolylineStyle({
          color: '#224BCF', // 线填充色
          width: 5, // 折线宽度
          lineCap: 'round', // 线端头方式
          dashArray: [10, 10] // 虚线展示方式
        })
      },
      geometries: [{
        styleId: 'style_blue',
        paths: paths
      },{
        styleId: 'style_dash',
        paths: dashPaths
      }],
    });
  </script>
</body>

</html>
