<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>粒子路况</title>
  </head>
  <script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>
  <style type="text/css">
    html,
    body {
      height: 100%;
      margin: 0px;
      padding: 0px;
      overflow: hidden;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
  </style>

  <body onload="initMap()">
    <div id="container"></div>
    <script type="text/javascript">
      function initMap() {
        var center = new TMap.LatLng(39.960957089008026, 116.44548038611174);
        // 初始化地图  MapOptions文档地址:https://lbs.qq.com/webApi/javascriptGL/glDoc/docIndexMap#2
        new TMap.Map('container', {
          zoom: 11, // 设置地图缩放级别
          center: center, // 设置地图中心点坐标
          mapStyleId: 'style1', // 个性化样式
          baseMap: [
            { type: 'vector' }, // 设置矢量底图
            {
              // traffic底图文档地址：https://lbs.qq.com/webApi/javascriptGL/glDoc/docIndexMap#7
              type: 'traffic',
              features: ['base', 'flow'], // 路况图要素类型
              opacity: 0.2, // 路况线网图的透明度
            },
          ],
        });
      }
    </script>
  </body>
</html>
