# D1: 敏感信息/密钥检测模式表
# 引用方: vuln-scan / logic-scan / red-team
# 用途: Grep 检测硬编码密钥、云凭证、元数据端点、存储暴露和数据库连接字符串
#
# === 知识版本管理 ===
# version: 2.0.0
# last_updated: "2026-04-29"
# update_strategy: semi_auto
# changelog:
#   - "2.0.0 (2026-04-29): 优化 API Key 检测模式"
#   - "1.0.0 (2026-03-01): 初始版本"

detection_patterns:
  - category: 硬编码密码
    patterns:
      - 'password\s*=\s*[''"][^''"]+[''"]'

  - category: API / 密钥
    patterns:
      - 'api[_-]?key\s*=\s*[''"][^''"]+[''"]'
      - 'secret[_-]?key\s*=\s*[''"][^''"]+[''"]'

  - category: 私钥
    patterns:
      - '-----BEGIN\s+(RSA\s+)?PRIVATE\s+KEY-----'

  - category: 访问令牌
    patterns:
      - 'access[_-]?token\s*=\s*[''"][^''"]+[''"]'

  - category: AWS 凭证
    patterns:
      - 'AKIA[0-9A-Z]{16}'
      - '(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY)\s*='

  - category: 阿里云 AK
    patterns:
      - 'LTAI[0-9A-Za-z]{12,20}'

  - category: 腾讯云 AK
    patterns:
      - 'AKID[0-9A-Za-z]{13,20}'

  - category: Azure
    patterns:
      - 'AccountKey\s*=\s*[A-Za-z0-9+/=]{40,}'

  - category: GCP 服务账号
    patterns:
      - '"type"\s*:\s*"service_account"'

  - category: IMDS 端点
    patterns:
      - '169\.254\.169\.254'
      - 'metadata\.google\.internal'
      - '100\.100\.100\.200'
      - 'metadata\.tencentyun\.com'

  - category: 云存储桶 URL
    patterns:
      - 's3://[a-z0-9.-]+'
      - '\.s3\.amazonaws\.com'
      - '\.oss-[a-z0-9-]+\.aliyuncs\.com'
      - '\.cos\.[a-z0-9-]+\.myqcloud\.com'

  - category: 公开存储桶 ACL
    patterns:
      - 'PublicRead'
      - 'public-read'
      - 'acl.*public'

  - category: 含密码的 JDBC
    patterns:
      - 'jdbc:[a-z]+://[^\s]+password=[^\s&]+'

  - category: MongoDB 认证
    patterns:
      - 'mongodb(\+srv)?://[^:]+:[^@]+@'

  - category: Redis 认证
    patterns:
      - 'redis://:[^@]+@'



exclusion_rules:
  - description: 测试文件
    patterns: ['*test*', '*spec*', '*mock*', '*fixture*']
  - description: 占位符值
    values: ['your-api-key-here', 'changeme', 'xxx', 'placeholder', 'example']
  - description: 环境变量引用
    patterns: ['os.environ', 'process.env', 'System.getenv']
  - description: 注释中作为文档示例的值
    note: 注释中作为文档示例的值不标记
