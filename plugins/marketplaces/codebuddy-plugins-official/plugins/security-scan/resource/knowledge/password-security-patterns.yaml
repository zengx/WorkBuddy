# D8: 密码安全检测模式表
# 引用方: vuln-scan / logic-scan / red-team
# 用途: 检测密码存储、密码策略、密码重置流程中的安全缺陷

# ============================================================================
# 一、不安全的密码存储/哈希
# ============================================================================

insecure_password_storage:
  description: "检测使用不安全算法存储密码的代码模式"

  vulnerable_patterns:
    - category: 明文存储密码
      patterns:
        - 'password\s*=\s*request\.'               # 直接取用户密码存库
        - 'setPassword\s*\(\s*\w+\.getPassword\(\)'  # Java Bean 直接赋值
        - 'user\.password\s*=\s*password'           # 直接赋值无哈希
        - 'INSERT.*password.*VALUES.*\?'            # SQL 直接插入
      absence_check: 'hash|encrypt|bcrypt|argon|scrypt|pbkdf|encode'
      note: "密码从请求直接写入数据库，未经过任何哈希处理"

    - category: 使用 MD5 哈希密码
      patterns:
        - 'MD5\s*\(\s*password'
        - 'md5\s*\(\s*password'
        - 'hashlib\.md5\(.*password'
        - 'MessageDigest\.getInstance\(\s*[''"]MD5[''"]\).*password'
        - 'DigestUtils\.md5Hex\(.*password'
        - 'crypto\.createHash\(\s*[''"]md5[''"]\).*password'
      note: "MD5 不适合密码哈希：速度过快且存在碰撞攻击"

    - category: 使用 SHA1/SHA256 无盐哈希密码
      patterns:
        - 'SHA-?1\s*\(.*password'
        - 'sha1\s*\(.*password'
        - 'hashlib\.sha(1|256)\(.*password'
        - 'MessageDigest\.getInstance\(\s*[''"]SHA'
        - 'DigestUtils\.sha\d+Hex\(.*password'
        - 'crypto\.createHash\(\s*[''"]sha'
      absence_check: 'salt|bcrypt|argon|scrypt|pbkdf'
      note: "SHA 系列无盐哈希不适合密码存储：速度过快，无盐易受彩虹表攻击"

    - category: 自定义/简易加密存储密码
      patterns:
        - 'Base64\.encode.*password'
        - 'btoa\s*\(\s*password'
        - 'AES.*password'                          # 可逆加密存储密码
        - 'encrypt\s*\(\s*password'
        - 'XOR.*password'
      note: "使用可逆编码/加密存储密码，泄露后可直接还原"

  safe_patterns:
    - 'BCryptPasswordEncoder'                       # Spring Security
    - 'bcrypt\.hashpw'                              # Python bcrypt
    - 'bcrypt\.hash\('                              # Node.js bcrypt
    - 'argon2\.hash\('                              # Argon2
    - 'scrypt'                                      # scrypt
    - 'Pbkdf2PasswordEncoder'                       # Java PBKDF2
    - 'hashlib\.pbkdf2_hmac'                        # Python PBKDF2
    - 'password_hash\(.*PASSWORD_BCRYPT'            # PHP
    - 'make_password\('                             # Django
    - 'generate_password_hash\('                    # Flask/Werkzeug

# ============================================================================
# 二、密码策略缺陷
# ============================================================================

weak_password_policy:
  description: "检测密码复杂度和策略配置的安全缺陷"

  patterns:
    - category: 最小长度过短
      patterns:
        - 'minLength\s*[:=]\s*[1-5][^0-9]'
        - 'password.*\.length\s*>=?\s*[1-5][^0-9]'
        - 'len\s*\(\s*password\s*\)\s*>=?\s*[1-5][^0-9]'
        - 'MIN_PASSWORD_LENGTH\s*=\s*[1-5][^0-9]'
      note: "密码最小长度 < 6 位，弱密码风险极高"

    - category: 无复杂度要求
      grep_keywords: "password.*register|setPassword|changePassword|resetPassword"
      absence_check: 'upper|lower|digit|special|complex|strength|[A-Z]|[a-z]|[0-9]|[!@#$%]'
      note: "密码设置/修改接口无复杂度校验（大小写/数字/特殊字符）"

    - category: 默认密码/弱密码列表
      patterns:
        - 'defaultPassword\s*[:=]\s*[''"]'
        - 'initialPassword\s*[:=]\s*[''"]'
        - 'password\s*[:=]\s*[''"]123456[''"]'
        - 'password\s*[:=]\s*[''"]password[''"]'
        - 'password\s*[:=]\s*[''"]admin[''"]'
        - 'password\s*[:=]\s*[''"]qwerty[''"]'
      note: "代码中设置默认密码或常见弱密码"

    - category: 密码与用户名相同检测缺失
      grep_keywords: "password.*register|setPassword|changePassword"
      absence_check: 'username.*password|password.*username|sameAs|equals.*username'
      note: "未校验密码是否与用户名相同"

# ============================================================================
# 三、密码重置流程安全
# ============================================================================

password_reset_security:
  description: "检测密码重置/找回流程中的安全缺陷"

  vulnerable_patterns:
    - category: 重置令牌可预测
      patterns:
        - 'UUID\.randomUUID\(\)\.toString\(\)\.substring'  # 截断 UUID
        - 'Random\(\)\.nextInt'                            # 非安全随机数
        - 'Math\.random\(\)'                               # JS 非安全随机
        - 'random\.randint\('                              # Python 非安全随机
        - 'System\.currentTimeMillis'                      # 时间戳作令牌
        - 'new\s+Date\(\)\.getTime\(\)'                    # 时间戳作令牌
      context: "在密码重置/找回流程中生成令牌"
      note: "使用可预测的随机数生成重置令牌"

    - category: 重置令牌无过期
      grep_keywords: "resetToken|reset_token|resetCode|verification_code"
      absence_check: 'expire|expiry|ttl|validUntil|timeout|createdAt.*\+'
      note: "密码重置令牌/验证码无过期时间"

    - category: 用户枚举
      grep_keywords: "forgotPassword|forgot_password|resetPassword|reset_password"
      patterns:
        - '"用户不存在"'
        - '"User not found"'
        - '"Invalid username"'
        - '"该邮箱未注册"'
        - '"Email not registered"'
      note: "密码重置接口通过不同错误信息泄露用户是否存在"

    - category: 重置令牌通过 URL 明文传输
      patterns:
        - 'reset_url.*token.*http://'
        - 'resetLink.*http://'
      note: "重置令牌通过 HTTP（非 HTTPS）URL 传输"

    - category: 重置令牌使用后未失效
      grep_keywords: "resetPassword|reset_password|verifyToken"
      absence_check: 'delete.*token|invalidate.*token|used.*true|token.*null|remove.*token'
      note: "密码重置成功后未删除/失效旧令牌，可重复使用"

    - category: 旧密码验证缺失
      grep_keywords: "changePassword|change_password|updatePassword"
      absence_check: 'oldPassword|currentPassword|old_password|current_password|verifyPassword'
      note: "修改密码接口不需要验证旧密码"

# ============================================================================
# 四、暴力破解防护缺失
# ============================================================================

brute_force_protection:
  description: "检测登录/密码接口是否缺少暴力破解防护"

  grep_keywords: "login|signin|sign_in|authenticate|verify_password"
  absence_check: 'rateLimit|rate_limit|maxAttempts|lockout|captcha|throttle|failedAttempts|loginAttempts'

  patterns:
    - category: 无登录失败锁定
      patterns:
        - 'authenticate\(.*username.*password'
        - 'verifyPassword\('
        - 'password\.equals\('
        - 'bcrypt\.compare\('
      absence_check: 'lockout|maxAttempts|failedAttempts|accountLock|freeze'
      note: "登录验证逻辑无失败次数限制/账户锁定"

    - category: 无验证码/人机验证
      grep_keywords: "login|register|forgotPassword"
      absence_check: 'captcha|recaptcha|hCaptcha|turnstile|verify_code|slider'
      note: "关键接口无验证码或人机验证防护"

# ============================================================================
# 五、判定补充规则
# ============================================================================

pattern_judgment_supplements:
  - type: 明文密码存储
    condition: "密码从请求获取后直接写入数据库/对象，调用链中无任何哈希/加密处理"
    action: "创建 plaintext-password finding"
    severity: "medium"

  - type: 弱哈希算法
    condition: "使用 MD5/SHA1/SHA256 无盐哈希存储密码"
    action: "创建 weak-password-hash finding"
    severity: "low"

  - type: 密码重置令牌可预测
    condition: "使用非安全随机数（Math.random/Random/时间戳）生成密码重置令牌"
    action: "创建 predictable-reset-token finding"
    severity: "medium"

  - type: 暴力破解防护缺失
    condition: "登录接口无任何失败限制/锁定/验证码机制"
    action: "创建 brute-force-unprotected finding"
    severity: "low"
