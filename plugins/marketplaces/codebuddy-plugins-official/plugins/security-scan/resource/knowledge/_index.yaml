  - file: supply-chain-patterns.yaml
    load_strategy: conditional
    tech_stack: ["*"]
    description: 依赖混淆/恶意包/Typosquatting/废弃依赖 供应链安全检测模式
    lines: 166
    inline_candidate: false

  - file: ssrf.yaml
    load_strategy: conditional
    tech_stack: ["*"]  # 存在 SSRF 攻击面时加载
    description: SSRF 绕过技术参考数据
    lines: 23
    inline_candidate: true  # 小文件，可内联

  - file: auth-basic.yaml
    load_strategy: conditional
    tech_stack: ["*"]  # 通用鉴权检测
    description: 鉴权/越权基础检测模式
    lines: 64
    inline_candidate: false

  - file: ghost-bits-truncation.yaml
    load_strategy: conditional
    tech_stack: ["java-*"]
    description: Java Ghost Bits 类型截断漏洞检测（char→byte 高位截断导致 WAF 绕过，覆盖 4 种危险代码模式、12+ 受影响组件、攻击链推理规则、防御检查清单）
    lines: 210
    inline_candidate: false

  - file: tencent-cloud-security.yaml
    load_strategy: conditional
    tech_stack: ["*"]  # 使用云服务时加载（含通用凭据/Endpoint 配置消费检查，跨云通用）
    description: 云安全检测模式（CAM 策略/COS 与 STS 鉴权/凭据 Endpoint 配置消费层空值校验[语义角色，跨语言跨云通用]/数据万象/IMDS 元数据/CVM 安全组/SCF 云函数/TKE 容器/CDB 数据库）
    lines: 657
    inline_candidate: false

  - file: ai-agent-security.yaml
    load_strategy: conditional
    tech_stack: ["python-*", "nodejs-*", "*"]
    description: AI Agent 安全检测模式（提示词注入/工具执行/系统提示泄露/MCP 信任/Agent 输出 sink）— 场景 ai_agent_app 触发（仅 Light）
