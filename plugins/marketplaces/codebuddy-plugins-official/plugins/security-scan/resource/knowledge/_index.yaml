  - file: sandbox-escape-patterns.yaml
    load_strategy: conditional
    tech_stack: ["*"]
    description: 沙箱逃逸检测模式（Node vm/Python eval/容器/seccomp/WASI/通用 eval）— 场景 sandbox_runtime 触发（仅 Light）
    inline_candidate: false

  - file: mobile-security-patterns.yaml
    load_strategy: conditional
    tech_stack: ["android-*", "ios-*", "react-native", "flutter"]
    description: 移动客户端安全检测模式（组件暴露/WebView JS Bridge/证书校验缺失/本地明文存储/Intent 重定向/明文流量，对标 OWASP MASVS）— 场景 mobile_app 触发（仅 Light）
    inline_candidate: false

  - file: desktop-security-patterns.yaml
    load_strategy: conditional
    tech_stack: ["electron", "nodejs-*"]
    description: 桌面/Electron 客户端安全检测模式（Node 集成/上下文隔离/webSecurity/IPC 无校验/shell 命令注入/远程内容/preload 暴露/自动更新验签，对标 Electron Security Checklist）— 场景 desktop_app 触发（仅 Light）
    inline_candidate: false


