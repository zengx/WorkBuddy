# knowledge 索引文件
# Agent 可一次 Read 此索引，根据技术栈和场景精准选择需要加载的知识文件。
# load_strategy: always = 扫描流程总是加载 | conditional = 按需加载
#
# === 知识更新机制 ===
# 工具: ${CODEBUDDY_PLUGIN_ROOT}/scripts/knowledge_updater.py
# 用法:
#   check-freshness  — 检查哪些知识文件已过期（距上次更新超过 threshold）
#   suggest-updates  — 为过期文件生成候选更新建议（含 WebSearch 查询模板）
#   apply-update     — 将审核通过的更新合并到知识文件（自动更新版本号）
#   show-versions    — 显示所有知识文件的版本/更新日期
#
# update_strategy 类别:
#   semi_auto = 脚本生成候选更新 + 人工审核后合并（推荐）
#   manual    = 纯人工维护（不频繁变化的知识）
#   static    = 不需要更新（稳定的参考数据）

# ============================================================================
# 安全漏洞知识（漏洞类型 + 检测模式 + 安全/不安全写法）
# ============================================================================

vulnerability_knowledge:
  - file: session-cookie-patterns.yaml
    load_strategy: conditional
    tech_stack: ["*"]
    description: 会话/Cookie/JWT 安全检测模式（Session 固定、SameSite、JWT 审计）
    lines: 172
    inline_candidate: false

  - file: password-security-patterns.yaml
    load_strategy: conditional
    tech_stack: ["*"]
    description: 密码存储/策略/重置流程安全检测模式
