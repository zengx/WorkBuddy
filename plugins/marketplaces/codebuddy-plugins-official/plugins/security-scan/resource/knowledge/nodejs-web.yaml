# Node.js Web 框架安全专项规则
# 适用条件：侦察检测到 Node.js + Express/Koa/NestJS
#
# 使用须知：本文件为参考资料，辅助识别 Node.js 框架特有的 Sink/防御模式。
# Agent 的安全分析能力不受限于此文件列出的风险类型——应基于代码实际行为推理，
# 发现未列出的风险时正常报告，不做知识对账。

framework: nodejs-web
applies_to: ["javascript", "typescript"]

# 框架特有的 Sink 模式
sink_patterns:
  express:
    - pattern: "res.send(user_input)"
      sink_type: xss
      severity: medium
      grep_probe: "res\\.send\\(|res\\.write\\("
      description: "Express直接返回用户输入（无模板引擎时，需链式利用）"
    - pattern: "eval(req.body)"
      sink_type: code-execution
      severity: critical
      grep_probe: "eval\\(.*req\\."
      description: "Express请求参数传入eval"
    - pattern: "child_process.exec(user_input)"
      sink_type: command-injection
      severity: critical
      grep_probe: "child_process\\.(exec|execSync)\\("
      description: "Express用户输入传入命令执行"

  nestjs:
    - pattern: "TypeORM raw query"
      sink_type: sql-injection
      severity: high
      grep_probe: "\\.query\\(.*\\$\\{|\\.query\\(.*\\+"
      description: "NestJS TypeORM原始SQL拼接（可造成大量数据泄漏）"
    - pattern: "@Res() bypass"
      sink_type: security-bypass
      severity: medium
      grep_probe: "@Res\\(\\)|@Response\\(\\)"
      description: "NestJS绕过框架响应处理"

# Node.js 特有的危险模式
dangerous_patterns:
  - pattern: "new Function(user_input)"
    sink_type: code-execution
    severity: critical
    grep_probe: "new\\s+Function\\("
  - pattern: "vm.runInNewContext"
    sink_type: sandbox-escape
    severity: critical
    grep_probe: "vm\\.(runInNewContext|runInThisContext|createScript)"
  - pattern: "require(user_input)"
    sink_type: arbitrary-require
    severity: critical
    grep_probe: "require\\(.*req\\.|require\\(.*user"
  - pattern: "prototype pollution"
    sink_type: prototype-pollution
    severity: medium
    grep_probe: "__proto__|constructor\\[|Object\\.assign\\(.*req\\."
    description: "原型链污染"

# 框架自动防御
framework_defenses:
  express:
    - defense: "helmet middleware"
      effectiveness: "有效 — 设置安全HTTP头"
      check: "grep helmet package.json"
    - defense: "express-validator"
      effectiveness: "有效 — 输入校验"
      check: "grep express-validator package.json"
    - defense: "csurf middleware"
      effectiveness: "有效 — CSRF防护"
      check: "grep csurf package.json"

  nestjs:
    - defense: "class-validator decorators"
      effectiveness: "有效 — DTO级别输入校验"
      confidence_impact: -15
    - defense: "TypeORM QueryBuilder"
      effectiveness: "有效 — 自动参数化"
      confidence_impact: -20
    - defense: "@nestjs/throttler"
      effectiveness: "有效 — 速率限制"

# ORM 安全模式
orm_safe_patterns:
  - pattern: "Sequelize parameterized"
    description: "Sequelize .findAll({ where: {} }) 自动参数化"
    is_defense: true
  - pattern: "Prisma type-safe"
    description: "Prisma 类型安全查询，不支持原始SQL拼接"
    is_defense: true
  - pattern: "TypeORM QueryBuilder"
    description: "TypeORM createQueryBuilder().where('x = :val', {val}) 参数化"
    is_defense: true
