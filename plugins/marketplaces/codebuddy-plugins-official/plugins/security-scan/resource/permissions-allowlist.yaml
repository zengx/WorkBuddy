# ============================================================
# 效果预估
# ============================================================
#
# 白名单条目：37 条 Bash + 3 条 Write + 3 条 CreateFile = 43 条
#
# 配置前（一次 Deep 扫描约 100-120 次需授权的调用）：
#   - PYTHON_SCRIPT 调用 ~45 次 → 全部需要手动确认
#   - ENV_PYTHON_SCRIPT 调用 ~15 次 → 全部需要手动确认
#   - PYTHON_INLINE 调用 ~10 次 → 全部需要手动确认
#   - GIT_READONLY 调用 ~5 次 → 全部需要手动确认
#   - SCAN_INIT/FILE_ENUM/DIR_LIST/其他 ~15 次 → 全部需要手动确认
#   - Write 输出文件 ~15 次 → 全部需要手动确认
#
# 配置后：
#   - 上述 12 个模板的所有调用全部自动通过
#   - 仅 Edit/MultiEdit（修复）~5 次 + WebSearch ~3 次 需手动确认
#   - 合计约 8 次手动授权（减少 ~93%+）
#
# 关键改进：
#   - 覆盖 Agent 子任务需 export 环境变量的场景（模板 10）
#   - 覆盖轻量数据处理的 python3 -c 内联调用（模板 11）
#   - 覆盖目录列表查看 ls 命令（模板 9）
#   - 覆盖简单回显验证 echo 命令（模板 12）
#   - 所有调用可预测，不会出现白名单外的意外变体
#
# ============================================================
