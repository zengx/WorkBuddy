        name_en: "Missing Root / Jailbreak / Anti-Debug Protection"
        severity_default: "low"  # agent-rules.md §4：纵深防御项
        scan_level: ["light", "deep"]
        tech_stack: ["android-*", "ios-*"]
        scenarios: "金融/支付/隐私类 App 缺少 Root/越狱检测、反调试、模拟器检测或完整性校验，攻击者可在受控环境动态调试与篡改"

  desktop_security:
    label: "桌面与混合客户端安全类"
    types:
      - slug: "electron-node-integration"
        name: "Electron 渲染进程 Node 集成开启"
        name_en: "Electron NodeIntegration Enabled"
        aliases: ["nodeIntegration true", "contextIsolation false", "Electron 上下文隔离关闭"]
        severity_default: "medium"  # agent-rules.md §4：影响限于本地客户端执行上下文，不可远程触发，客户端封顶 medium
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["electron", "nodejs-*"]
        scenarios: "new BrowserWindow webPreferences 设 nodeIntegration:true 或 contextIsolation:false，渲染进程可直接访问 require/process/child_process，任意 XSS 即可提升为本地代码执行"
      - slug: "electron-disabled-websecurity"
        name: "Electron 安全开关关闭"
        name_en: "Electron Web Security Disabled"
        aliases: ["webSecurity false", "allowRunningInsecureContent", "sandbox false"]
        severity_default: "medium"  # agent-rules.md §4：关闭同源/沙箱仅削弱本地客户端防护，非远程可利用，客户端封顶 medium
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["electron", "nodejs-*"]
        scenarios: "webPreferences 设 webSecurity:false（关闭同源策略）、allowRunningInsecureContent:true、sandbox:false，导致跨域/混合内容/沙箱防护失效"
      - slug: "electron-shell-command-injection"
        name: "Electron shell 接口命令注入"
        name_en: "Electron Shell Command Injection"
        aliases: ["shell.openExternal 注入", "shell.openPath 注入"]
        severity_default: "medium"  # agent-rules.md §4：openExternal/openPath 触发本地协议/程序调起，非服务端命令注入，客户端封顶 medium
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["electron", "nodejs-*"]
        scenarios: "shell.openExternal/openPath/openItem 接收渲染进程或远程内容传入的 URL/路径，未做 scheme 白名单与参数校验，可触发任意程序/协议执行"
      - slug: "electron-ipc-no-validation"
        name: "Electron IPC 通道无校验"
        name_en: "Electron IPC Without Validation"
        aliases: ["ipcMain 信任 renderer", "IPC sender 未校验"]
        severity_default: "medium"  # agent-rules.md §4：IPC 越权限于本地进程间，非远程可利用，客户端封顶 medium
        scan_level: ["light", "deep"]
        tech_stack: ["electron", "nodejs-*"]
        scenarios: "ipcMain.handle/on 直接信任渲染进程传入的参数（文件路径/命令/SQL/URL）并执行特权操作，未校验 event.senderFrame 来源、未做参数白名单"
      - slug: "electron-remote-content"
        name: "Electron 加载不可信远程内容"
        name_en: "Electron Untrusted Remote Content"
        aliases: ["loadURL 远程内容", "will-navigate 未限制", "new-window 未限制"]
        severity_default: "medium"  # agent-rules.md §4：需叠加高权限配置且利用链落在本地客户端，客户端封顶 medium
        scan_level: ["light", "deep"]
        tech_stack: ["electron", "nodejs-*"]
        scenarios: "loadURL 加载 http(s) 远程/用户可控页面，未通过 will-navigate / setWindowOpenHandler / will-attach-webview 限制导航与新窗口，远程内容可结合高权限配置发起攻击"
      - slug: "electron-preload-overexposure"
        name: "Electron preload 过度暴露"
        name_en: "Electron Preload Over-Exposure"
        aliases: ["contextBridge 暴露危险 API", "preload 挂 window"]
        severity_default: "medium"  # agent-rules.md §4
        scan_level: ["light", "deep"]
        tech_stack: ["electron", "nodejs-*"]
        scenarios: "preload 脚本通过 contextBridge.exposeInMainWorld 或直接挂载到 window，向渲染进程暴露 ipcRenderer.send 通配、require、fs、child_process 等危险能力，等同绕过上下文隔离"
      - slug: "unsigned-auto-update"
        name: "自动更新签名校验缺失"
        name_en: "Unsigned Auto-Update"
        aliases: ["更新包未验签", "autoUpdater 不安全 feed"]
        severity_default: "medium"  # agent-rules.md §4：依赖中间人/劫持更新源的本地利用前提，客户端封顶 medium
        scan_level: ["light", "deep"]
        tech_stack: ["electron", "*"]
        scenarios: "autoUpdater/electron-updater 使用 http feed 或未校验更新包签名/哈希，中间人或被劫持的更新源可投递恶意安装包"
      - slug: "protocol-handler-hijack"
        name: "自定义协议处理器劫持"
        name_en: "Custom Protocol Handler Hijack"
        aliases: ["setAsDefaultProtocolClient 注入", "registerSchemesAsPrivileged 滥用"]
        severity_default: "medium"  # agent-rules.md §4
        scan_level: ["light", "deep"]
        tech_stack: ["electron", "*"]
        scenarios: "通过 setAsDefaultProtocolClient 注册自定义协议，open-url/second-instance 回调将协议参数未校验地用于导航、文件加载或命令拼接，外部链接可触发敏感操作"



