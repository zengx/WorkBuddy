        tech_stack: ["*"]
        scenarios: "COS/S3/OSS ACL/Policy 允许公开访问、预签名 URL 有效期过长"
      - slug: "cos-sts-missing"
        name: "COS/万象 STS 鉴权缺失"
        name_en: "COS/CI STS Authorization Missing"
        aliases: ["COS STS 缺失", "万象 STS 缺失", "COS 临时密钥缺失", "Cloud Infinite STS Missing"]
        severity_default: "high"  # agent-rules.md §4：用户可控对象 Key + 写/删/处理类云操作且未绑定 STS 最小权限
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["*"]
        scenarios: "面向用户的 COS/数据万象上传、下载、删除、图片处理接口接收 key/fileName/path 等对象 Key，或 coscgi 转发至万象仅做内部签名 + 账号鉴权，但未配置 STS 临时凭证、sessionToken 或按前缀收敛的临时授权"
      - slug: "cos-sts-policy-overprivilege"
        name: "COS 临时密钥策略过宽"
        name_en: "COS STS Temporary Policy Overprivilege"
        aliases:
          - "STS 临时密钥过宽"
          - "临时密钥任意文件覆盖"
          - "临时密钥高危 action"
          - "COS Temp Credential Wildcard Policy"
        severity_default: "high"  # agent-rules.md §4：服务端确在签发 STS，但临时策略 Resource 通配 + Action 含写/删/桶级高危 ⇒ 密钥泄露即可覆盖/删除桶内任意文件
        scan_level: ["light", "deep"]
        tech_stack: ["*"]
        scenarios: "服务端通过 qcloud-cos-sts-sdk(GetCredential/CredentialPolicy) 或 AssumeRole/GetFederationToken 签发临时密钥时，allow Statement 的 Resource 写成 `*` 或桶级通配 `qcs::cos:...:uid/<appid>:.../{bucket}/*`，且 Action 含 PutObject/PostObject（任意文件覆盖）、cos:*/* （全量）或 PutBucketACL/DeleteBucket/DeleteObject 等桶级高危操作，且用户可控对象 Key/前缀未做通配符过滤与归属收敛（对照《COS 临时密钥通用检测规则》）"
      - slug: "auth-element-incomplete"
        name: "认证要素缺失"
        name_en: "Authentication Element Incomplete"
        aliases:
          - "签名要素不完整"
          - "签名未绑定身份"
          - "Signature Missing Identity Binding"
          - "Signature Replay across Tenants"
        severity_default: "high"  # agent-rules.md §4：用户可控 sink + 身份/资源字段未参与签名 ⇒ 跨租户 IDOR/SSRF；verifier 实证跨租户可达后可 +1 升 critical
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["*"]
        scenarios: "签名/校验函数（Sign/HMAC/MD5/SHA256/CalcSign 等）的入参仅包含 time/key/path，但下游构造云请求时把 ownerUin、sub_uin、ownerAppid、Host、bucket、region 等身份/资源字段从 X-COS-CI-ARGS / 自定义 header / base64(protobuf) 中事后解析并写入 URL/Header，导致同一签名可被攻击者复用并伪造任意租户身份（CWE-639/CWE-345）；典型例：media-cgi action_base.cpp::adjustCosRequest()"
      - slug: "security-group-open"
        name: "安全组过度开放"
        name_en: "Security Group Overly Open"
        severity_default: "high"  # agent-rules.md §4
        scan_level: ["light", "deep"]
        tech_stack: ["*"]
        scenarios: "CVM 安全组对 0.0.0.0/0 开放高危端口（SSH/RDP/DB）"
      - slug: "serverless-no-auth"
        name: "云函数无认证"
