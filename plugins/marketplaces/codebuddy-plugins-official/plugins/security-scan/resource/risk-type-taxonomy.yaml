        severity_default: "low"  # agent-rules.md §4：CWE-319
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["android-*", "ios-*", "react-native", "flutter"]
        scenarios: "AndroidManifest android:usesCleartextTraffic=\"true\"、network_security_config 允许明文、iOS Info.plist NSAllowsArbitraryLoads=true、代码中硬编码 http:// 接口"
      - slug: "debuggable-backup-enabled"
        name: "调试与备份不安全配置"
        name_en: "Debuggable / Backup Enabled"
        aliases: ["android:debuggable", "android:allowBackup"]
        severity_default: "low"  # agent-rules.md §4：CWE-489/CWE-530
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["android-*"]
        scenarios: "AndroidManifest 设 android:debuggable=\"true\"（可挂调试器）或 android:allowBackup=\"true\"（adb backup 可导出应用私有数据）"
      - slug: "intent-redirection"
