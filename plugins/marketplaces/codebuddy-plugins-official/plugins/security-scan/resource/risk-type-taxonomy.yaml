        aliases: ["SSL Pinning 缺失", "TrustManager 空实现", "信任所有证书", "HostnameVerifier 恒真"]
        severity_default: "medium"  # agent-rules.md §4：CWE-295，中间人可解密/篡改通信
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["android-*", "ios-*", "react-native", "flutter"]
        scenarios: "自定义 X509TrustManager.checkServerTrusted 空实现、HostnameVerifier 恒返回 true、setHostnameVerifier(ALLOW_ALL)、iOS NSURLSession 忽略证书校验、未做证书/公钥固定（Pinning）"
      - slug: "insecure-mobile-storage"
        name: "移动端敏感数据明文存储"
        name_en: "Insecure Mobile Local Storage"
        aliases: ["SharedPreferences 明文凭证", "NSUserDefaults 明文凭证", "SQLite 明文存储"]
        severity_default: "medium"  # agent-rules.md §4：CWE-312，设备丢失/Root/越狱后凭证泄露
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["android-*", "ios-*", "react-native", "flutter"]
        scenarios: "Token/密码/密钥明文写入 SharedPreferences、NSUserDefaults、明文 SQLite、外部存储或 plist，未使用 Keystore/Keychain 或加密存储"
      - slug: "cleartext-traffic"
