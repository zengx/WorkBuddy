  mobile_security:
    label: "移动客户端安全类"
    types:
      - slug: "exported-component"
        name: "组件暴露"
        name_en: "Exported Component"
        aliases: ["Activity/Service/Receiver 暴露", "ContentProvider 暴露", "Android Exported Component"]
        severity_default: "medium"  # agent-rules.md §4：客户端本地攻击面，利用需同设备恶意 App/本地条件，不可远程触发、不构成命令执行，客户端封顶 medium
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["android-*"]
        scenarios: "AndroidManifest.xml 中 Activity/Service/BroadcastReceiver/ContentProvider 设 android:exported=\"true\" 且无 android:permission 保护，或 intent-filter 隐式导出，可被恶意 App 调起、注入 Intent 或越权读写 Provider 数据"
      - slug: "insecure-webview"
        name: "WebView 不安全配置"
        name_en: "Insecure WebView"
        aliases: ["addJavascriptInterface 注入", "WebView JS Bridge 暴露", "WebView File 域访问"]
        severity_default: "medium"  # agent-rules.md §4：JS Bridge 仅在设备本地 WebView 上下文生效，非服务端远程利用，客户端封顶 medium
        scan_level: ["fast", "light", "deep"]
        tech_stack: ["android-*", "ios-*", "react-native", "flutter"]
        scenarios: "setJavaScriptEnabled(true) + addJavascriptInterface 暴露原生方法、setAllowFileAccess/AllowUniversalAccessFromFileURLs 开启、loadUrl 加载用户可控 URL、iOS WKWebView evaluateJavaScript 拼接用户输入"
      - slug: "improper-cert-validation"
        name: "证书校验缺失"
