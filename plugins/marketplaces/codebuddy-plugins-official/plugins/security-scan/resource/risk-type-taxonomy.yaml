        severity_default: "medium"  # agent-rules.md §4
        scan_level: ["light", "deep"]
        tech_stack: ["*"]
        scenarios: "SCF 云函数 API 网关触发器 authType=NONE"
      - slug: "cloud-db-exposed"
        name: "云数据库公网暴露"
        name_en: "Cloud Database Exposed"
        severity_default: "medium"  # agent-rules.md §4
        scan_level: ["light", "deep"]
        tech_stack: ["*"]
        scenarios: "CDB/RDS 开启公网访问、连接串硬编码"

